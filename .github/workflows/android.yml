name: Android CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:  # ဒါထည့်ထားမှ Manual run လုပ်လို့ရမယ်

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive  # submodules ပါထည့်ဖို့လိုတယ်
        
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'  # JDK 11 ကနေ 17 ကိုပြောင်းလိုက်တယ်
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Build with Gradle
      run: ./gradlew assembleDebug  # build အစား assembleDebug ကိုသုံးမယ်
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/
